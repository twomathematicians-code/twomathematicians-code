name: Update Dynamic Profile README

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - README.md
      - scripts/update_profile_readme.py
      - .github/workflows/update-profile-readme.yml
  schedule:
    - cron: "0 */6 * * *"

permissions:
  contents: write

jobs:
  update-readme:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Update README from live GitHub data
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PROFILE_USERNAME: twomathematicians-code
        run: python scripts/update_profile_readme.py

      - name: Commit and push changes
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: auto-update dynamic profile dashboard"
          file_pattern: README.md
