<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 340" width="900">
  <defs>
    <!-- Chalk texture filter -->
    <filter id="chalk" x="-5%" y="-5%" width="110%" height="110%">
      <feTurbulence type="fractalNoise" baseFrequency="0.65" numOctaves="3" result="noise"/>
      <feComposite in="SourceGraphic" in2="noise" operator="in"/>
    </filter>
    <filter id="chalkGlow" x="-5%" y="-5%" width="110%" height="110%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="0.6" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
    <filter id="dust" x="-5%" y="-5%" width="110%" height="110%">
      <feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="4" result="noise"/>
      <feColorMatrix type="saturate" values="0" in="noise" result="grayNoise"/>
      <feBlend in="SourceGraphic" in2="grayNoise" mode="multiply" result="textured"/>
      <feComposite in="textured" in2="SourceGraphic" operator="over"/>
    </filter>
    <!-- Wood grain for frame -->
    <linearGradient id="wood" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#5c3a1e"/>
      <stop offset="15%" stop-color="#7a4e2d"/>
      <stop offset="30%" stop-color="#6b4226"/>
      <stop offset="50%" stop-color="#8b5e3c"/>
      <stop offset="70%" stop-color="#6b4226"/>
      <stop offset="85%" stop-color="#7a4e2d"/>
      <stop offset="100%" stop-color="#5c3a1e"/>
    </linearGradient>
    <linearGradient id="woodV" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#5c3a1e"/>
      <stop offset="15%" stop-color="#7a4e2d"/>
      <stop offset="30%" stop-color="#6b4226"/>
      <stop offset="50%" stop-color="#8b5e3c"/>
      <stop offset="70%" stop-color="#6b4226"/>
      <stop offset="85%" stop-color="#7a4e2d"/>
      <stop offset="100%" stop-color="#5c3a1e"/>
    </linearGradient>
    <!-- Chalkboard gradient -->
    <radialGradient id="board" cx="50%" cy="40%" r="65%">
      <stop offset="0%" stop-color="#2d5a2a"/>
      <stop offset="50%" stop-color="#264d23"/>
      <stop offset="100%" stop-color="#1e3d1b"/>
    </radialGradient>
    <!-- Chalk tray gradient -->
    <linearGradient id="tray" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#6b4226"/>
      <stop offset="50%" stop-color="#8b5e3c"/>
      <stop offset="100%" stop-color="#5c3a1e"/>
    </linearGradient>
  </defs>

  <!-- Outer frame -->
  <rect x="0" y="0" width="900" height="340" rx="4" fill="#3a2210"/>
  <!-- Top frame -->
  <rect x="0" y="0" width="900" height="22" fill="url(#wood)" rx="4"/>
  <rect x="0" y="10" width="900" height="12" fill="url(#wood)"/>
  <!-- Bottom frame -->
  <rect x="0" y="318" width="900" height="22" fill="url(#wood)" rx="4"/>
  <rect x="0" y="318" width="900" height="12" fill="url(#wood)"/>
  <!-- Left frame -->
  <rect x="0" y="0" width="22" height="340" fill="url(#woodV)" rx="4"/>
  <rect x="10" y="0" width="12" height="340" fill="url(#woodV)"/>
  <!-- Right frame -->
  <rect x="878" y="0" width="22" height="340" fill="url(#woodV)" rx="4"/>
  <rect x="878" y="0" width="12" height="340" fill="url(#woodV)"/>

  <!-- Blackboard surface -->
  <rect x="22" y="22" width="856" height="296" fill="url(#board)"/>

  <!-- Subtle chalk dust smudges -->
  <ellipse cx="200" cy="180" rx="80" ry="40" fill="#3a6a35" opacity="0.3"/>
  <ellipse cx="650" cy="120" rx="100" ry="50" fill="#3a6a35" opacity="0.25"/>
  <ellipse cx="450" cy="260" rx="120" ry="35" fill="#3a6a35" opacity="0.2"/>

  <!-- Chalk tray -->
  <rect x="80" y="300" width="740" height="18" fill="url(#tray)" rx="2"/>
  <rect x="82" y="298" width="736" height="4" fill="#9b7e5c" rx="1"/>
  <!-- Chalk pieces on tray -->
  <rect x="180" y="303" width="35" height="8" rx="2" fill="#e8e8e0" opacity="0.9" transform="rotate(-3,197,307)"/>
  <rect x="240" y="304" width="28" height="7" rx="2" fill="#f0c040" opacity="0.85" transform="rotate(2,254,307)"/>
  <rect x="300" y="303" width="30" height="8" rx="2" fill="#ff7070" opacity="0.8" transform="rotate(-1,315,307)"/>
  <rect x="560" y="304" width="32" height="7" rx="2" fill="#80c0ff" opacity="0.85" transform="rotate(1,576,307)"/>
  <rect x="630" y="303" width="25" height="8" rx="2" fill="#e8e8e0" opacity="0.7" transform="rotate(-2,642,307)"/>

  <!-- ===== CHALK CONTENT ===== -->

  <!-- Decorative math symbols scattered (faint) -->
  <g filter="url(#dust)" opacity="0.15" fill="#c8dcc8" font-family="serif">
    <text x="55" y="65" font-size="22">∑</text>
    <text x="800" y="55" font-size="18">∂</text>
    <text x="120" y="285" font-size="20">∇</text>
    <text x="760" y="275" font-size="24">∫</text>
    <text x="830" y="130" font-size="16">∞</text>
    <text x="50" y="170" font-size="18">∀</text>
    <text x="840" y="200" font-size="20">∃</text>
    <text x="400" y="45" font-size="14">λ</text>
    <text x="500" y="290" font-size="16">π</text>
    <text x="150" y="50" font-size="12">∈</text>
    <text x="700" y="45" font-size="14">⊂</text>
    <text x="350" y="285" font-size="16">Ω</text>
    <text x="600" y="50" font-size="12">Δ</text>
  </g>

  <!-- Faint chalk equations in corners -->
  <g filter="url(#dust)" opacity="0.2" fill="none" stroke="#a8c8a0" stroke-width="1" font-family="'Courier New', monospace" font-size="11">
    <text x="50" y="90" fill="#a8c8a0" stroke="none">e^(iπ) + 1 = 0</text>
    <text x="730" y="90" fill="#a8c8a0" stroke="none">P(A|B) = P(B|A)P(A)/P(B)</text>
    <text x="50" y="250" fill="#a8c8a0" stroke="none">f(x) = Σ aₙxⁿ</text>
    <text x="720" y="250" fill="#a8c8a0" stroke="none">∂f/∂x = lim Δf/Δx</text>
  </g>

  <!-- Faint sine wave in background -->
  <path d="M60,200 Q100,175 140,200 Q180,225 220,200 Q260,175 300,200 Q340,225 380,200 Q420,175 460,200 Q500,225 540,200" 
        fill="none" stroke="#4a8a45" stroke-width="1" opacity="0.25" filter="url(#dust)"/>

  <!-- Faint gaussian curve -->
  <path d="M550,260 Q580,260 600,240 Q620,200 630,160 Q635,130 640,160 Q650,200 660,240 Q680,260 710,260" 
        fill="none" stroke="#4a8a45" stroke-width="1" opacity="0.2" filter="url(#dust)"/>

  <!-- ===== MAIN TITLE ===== -->
  <text x="450" y="115" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="38" font-weight="bold" fill="#f0efe8" filter="url(#chalkGlow)" letter-spacing="3">
    Mahesh Solanki
  </text>

  <!-- Underline - hand drawn style -->
  <path d="M220,128 Q270,132 320,127 Q370,122 420,128 Q470,134 520,127 Q570,120 620,127 Q670,134 680,128" 
        fill="none" stroke="#f0efe8" stroke-width="2" opacity="0.7" filter="url(#dust)"/>

  <!-- Subtitle -->
  <text x="450" y="162" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="17" fill="#c8d8c0" filter="url(#chalkGlow)" font-style="italic">
    Mathematician riding on the power of computation
  </text>

  <!-- Four pillars -->
  <g font-family="Georgia, 'Times New Roman', serif" filter="url(#chalkGlow)">
    <!-- Math -->
    <text x="175" y="210" text-anchor="middle" font-size="16" fill="#ffd966" font-weight="bold">∫ Mathematics</text>
    <line x1="110" y1="218" x2="240" y2="218" stroke="#ffd966" stroke-width="0.8" opacity="0.6"/>

    <!-- Technology -->
    <text x="350" y="210" text-anchor="middle" font-size="16" fill="#80d4ff" font-weight="bold">&lt;/&gt; Technology</text>
    <line x1="275" y1="218" x2="425" y2="218" stroke="#80d4ff" stroke-width="0.8" opacity="0.6"/>

    <!-- Research -->
    <text x="545" y="210" text-anchor="middle" font-size="16" fill="#ff9e80" font-weight="bold">🔬 Research</text>
    <line x1="480" y1="218" x2="610" y2="218" stroke="#ff9e80" stroke-width="0.8" opacity="0.6"/>

    <!-- Code -->
    <text x="735" y="210" text-anchor="middle" font-size="16" fill="#b9f6ca" font-weight="bold">⚡ Code</text>
    <line x1="685" y1="218" x2="785" y2="218" stroke="#b9f6ca" stroke-width="0.8" opacity="0.6"/>
  </g>

  <!-- Bottom equation - chalk written -->
  <text x="450" y="260" text-anchor="middle" font-family="'Courier New', monospace" font-size="15" fill="#e8e8d8" filter="url(#chalkGlow)" opacity="0.85">
    ∀ problem P :  lim  Code(P) = ∞  |  G = (V, E)  |  f : ℝⁿ → ℝᵐ
  </text>

  <!-- Decorative dots -->
  <g fill="#d0d8c8" opacity="0.4">
    <circle cx="200" cy="155" r="2"/>
    <circle cx="700" cy="155" r="2"/>
    <circle cx="250" cy="240" r="1.5"/>
    <circle cx="650" cy="240" r="1.5"/>
  </g>

  <!-- Small hand-drawn star near title -->
  <g filter="url(#dust)" opacity="0.4" fill="#f0efe8">
    <path d="M195,95 L198,88 L201,95 L208,95 L203,100 L205,107 L198,103 L191,107 L193,100 L188,95 Z" fill="none" stroke="#f0efe8" stroke-width="0.8"/>
    <path d="M695,95 L698,88 L701,95 L708,95 L703,100 L705,107 L698,103 L691,107 L693,100 L688,95 Z" fill="none" stroke="#f0efe8" stroke-width="0.8"/>
  </g>

  <!-- Corner brackets decoration -->
  <g stroke="#7aaa70" stroke-width="1.5" fill="none" opacity="0.3">
    <path d="M35,35 L35,55 M35,35 L55,35"/>
    <path d="M865,35 L865,55 M865,35 L845,35"/>
    <path d="M35,300 L35,280 M35,300 L55,300"/>
    <path d="M865,300 L865,280 M865,300 L845,300"/>
  </g>
</svg>
